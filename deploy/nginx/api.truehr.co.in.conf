# TRUE HR — Nginx for the API subdomain api.truehr.co.in
# Place at: /etc/nginx/sites-available/api.truehr.co.in
# Enable:   ln -s /etc/nginx/sites-available/api.truehr.co.in /etc/nginx/sites-enabled/
# Then include it in the certbot run (see DEPLOYMENT.md).
#
# Passes the path through unchanged to the backend (which serves under /api), so:
#   https://api.truehr.co.in/api/auth/login  ->  backend  /api/auth/login
# The Android app base URL is therefore:  https://api.truehr.co.in/api/

server {
    listen 80;
    listen [::]:80;
    server_name api.truehr.co.in;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4000;        # path preserved -> backend /api/...
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
