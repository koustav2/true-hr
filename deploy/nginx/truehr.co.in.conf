# TRUE HR — Nginx reverse proxy for truehr.co.in
# Place at: /etc/nginx/sites-available/truehr.co.in
# Enable:   ln -s /etc/nginx/sites-available/truehr.co.in /etc/nginx/sites-enabled/
# Then run certbot (see DEPLOYMENT.md) to add the HTTPS (443) block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name truehr.co.in www.truehr.co.in;

    # Onboarding uploads (photos, PDFs, signatures) travel as base64 JSON — allow headroom.
    client_max_body_size 25m;

    # API -> backend container (bound to localhost by docker-compose.prod.yml)
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Everything else -> Next.js web container
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
